<div class="historique-page">
    <h2>Historique</h2>
    <p>historique des presences individuelles.</p>
   
</div>

<div class="card shadow mb-4">
    <div class="card-header py-3 d-flex align-items-center justify-content-between">
       <div class="filter-container">
    <div class="input-group">
        <label for="dateDebut">Du :</label>
        <input type="date" id="dateDebut" class="custom-date-input">
    </div>
    <div class="input-group">
        <label for="dateFin">Au :</label>
        <input type="date" id="dateFin" class="custom-date-input">
    </div>
    <button class="btn-search" onclick="loadEmployeeHistory()">
        <i class="fas fa-search"></i> Filtrer
    </button>
</div>
        <div class="input-group" style="width: 300px;">
            <input type="text" id="matriculeInput" class="form-control" placeholder="Entrez le matricule...">
            <button class="btn btn-primary" onclick="loadEmployeeHistory()">Chercher</button>
        </div>
    </div>
    <div class="card-body">
        <h4 id="employeeName" class="text-center mb-4"></h4>
        <div style="height: 300px;">
            <canvas id="employeeLineChart"></canvas>
        </div>
    </div>
</div>

<div class="stats-container">
    <div class="stat-card present">
        <div class="stat-icon"><i class="fas fa-user-check"></i></div>
        <div class="stat-details">
            <span class="stat-label">Jours Présents</span>
            <span class="stat-number" id="totalPresents">0</span>
        </div>
    </div>
    <div class="stat-card absent">
        <div class="stat-icon"><i class="fas fa-user-times"></i></div>
        <div class="stat-details">
            <span class="stat-label">Jours Absents</span>
            <span class="stat-number" id="totalAbsents">0</span>
        </div>
    </div>
    <div class="stat-card hours">
        <div class="stat-icon"><i class="fas fa-clock"></i></div>
        <div class="stat-details">
            <span class="stat-label">Total Heures</span>
            <span class="stat-number" id="totalHours">0h</span>
        </div>
    </div>
</div>

<div class="custom-table-card">
    <div class="table-header">
        <h3>Détails des pointages - <span id="displayMatricule">...</span></h3>
        <button class="btn-export" onclick="window.print()"><i class="fas fa-print"></i> Imprimer</button>
    </div>
    <div class="table-responsive">
        <table class="modern-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Statut</th>
                    <th>Arrivée</th>
                    <th>Départ</th>
                    <th>Durée Travail</th>
                </tr>
            </thead>
            <tbody id="historyTableBody">
                </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="{{ url_for('static', filename='js/history.js') }}"></script>
