<div class="container-fluid stats-page">
    <div class="d-sm-flex align-items-center justify-content-between mb-5">
        <div>
            <h1 class="stat-page-title mb-1">Tableau de Bord des Statistiques</h1>
            <p class="text-muted">Suivi en temps réel des présences et performances</p>
        </div>
    </div>

    <div class="row mb-4 g-6 align-items-center justify-content-center" style="min-height: 550px;">
        
        <div class="col-lg-5 d-flex flex-column justify-content-center px-lg-5">
            <div class="row g-2">
                {% for kpi in kpi_list %}
                <div class="col-12">
                    <div class="card kpi-card kpi-{{ kpi.type }} shadow-sm">
                        <div class="card-body">
                            <div class="kpi-icon kpi-icon-{{ kpi.type }}"><i class="{{ kpi.icon }}"></i></div>
                            <div class="kpi-content">
                                <div class="kpi-label">{{ kpi.label }}</div>
                                <div class="kpi-value">{{ kpi.value }}</div>
                            </div>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>

        <div class="col-lg-7 d-flex align-items-center justify-content-center">
            <div class="card pie-card shadow-sm w-100" style="max-width: 550px; height: 500px;">
                <div class="card-header chart-header text-center">
                    <h6 class="card-title mb-0">
                        <i class="fas fa-chart-pie me-2 text-primary"></i>
                        Statistiques Présence (7 derniers jours)
                    </h6>
                </div>
                <div class="card-body d-flex align-items-center justify-content-center p-4">
                    <div style="position: relative; height: 100%; width: 100%;">
                        <canvas id="presence7DaysChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-12">
            <div class="card chart-card shadow-sm">
                <div class="card-header chart-header">
                    <h6 class="card-title mb-0">
                        <i class="fas fa-chart-bar me-2 text-primary"></i>
                        Durée de présence par employé (Heures)
                    </h6>
                </div>
                <div class="card-body chart-body">
                    <div style="position: relative; height:40vh; width:100%">
                        <canvas id="presenceChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/static/js/Chart.js"></script>
<script src="/static/js/Chart7Days.js"></script>
